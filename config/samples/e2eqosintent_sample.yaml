apiVersion: e2e.intent.domain/v1alpha1
kind: E2EQoSIntent
metadata:
  name: slices-intent
spec:
  intentGroups: # IntentExpectation
    - id: "embb"
      contexts: # IntentContext
        targetUEs: ["208930000000001"]
      expectations: # ExpectationTarget
        sliceType: "eMBB"
        bandwidth: "high"        # Translator mapping: 5QI=6
        resourceShare: "Partial"    # Translator mapping: maxPrb=50, priority=10
    - id: "urllc"
      contexts:
        targetUEs: ["208930000000002"]
      expectations:
        sliceType: "URLLC"
        latency: "ultra-low"     # Translator mapping: 5QI=85
        resourceShare: "Full" # Translator mapping: maxPrb=100, priority=200

