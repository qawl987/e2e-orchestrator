---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: e2eqosintents.e2e.intent.domain
spec:
  group: e2e.intent.domain
  names:
    kind: E2EQoSIntent
    listKind: E2EQoSIntentList
    plural: e2eqosintents
    shortNames:
    - e2eqos
    singular: e2eqosintent
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.fulfillmentState
      name: Fulfillment
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          E2EQoSIntent is the Schema for the E2E QoS Intent CRD.
          It allows rApps to declare high-level E2E network slice intents that the
          orchestrator translates into domain-specific configurations.
          Aligned with 3GPP TS 28.312 Intent-driven Management framework.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: E2EQoSIntentSpec defines the desired state of E2EQoSIntent.
            properties:
              intentGroups:
                description: IntentGroups is an array of intent groups to be processed
                  by the orchestrator.
                items:
                  description: |-
                    IntentGroup defines a single intent group within the E2EQoSIntent.
                    Each group targets specific UEs with expected QoS parameters.
                  properties:
                    contexts:
                      description: Contexts defines the scope/conditions for this
                        intent (e.g., target UEs).
                      properties:
                        targetUEs:
                          description: TargetUEs is a list of IMSI/SUPI identifiers
                            for target UEs.
                          items:
                            type: string
                          minItems: 1
                          type: array
                      required:
                      - targetUEs
                      type: object
                    expectations:
                      description: Expectations defines the expected QoS parameters
                        (SLA targets).
                      properties:
                        bandwidth:
                          description: Bandwidth specifies the bandwidth requirement
                            (for eMBB slices).
                          enum:
                          - dedicated-high
                          - high
                          - standard
                          type: string
                        latency:
                          description: Latency specifies the latency requirement (for
                            URLLC slices).
                          enum:
                          - ultra-low
                          - low
                          - medium
                          type: string
                        resourceShare:
                          description: ResourceShare specifies the PRB allocation
                            strategy.
                          enum:
                          - Full
                          - Partial
                          type: string
                        sliceType:
                          description: SliceType specifies the type of network slice.
                          enum:
                          - eMBB
                          - URLLC
                          - MIoT
                          type: string
                      required:
                      - resourceShare
                      - sliceType
                      type: object
                    id:
                      description: ID is a unique identifier for this intent group
                        (e.g., "embb", "urllc").
                      type: string
                  required:
                  - contexts
                  - expectations
                  - id
                  type: object
                minItems: 1
                type: array
            required:
            - intentGroups
            type: object
          status:
            description: |-
              E2EQoSIntentStatus defines the observed state of E2EQoSIntent.
              Aligned with 3GPP TS 28.312 Intent-driven Management closed-loop concepts.
            properties:
              conditions:
                description: Conditions represent the latest available observations
                  of the intent's state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              fulfillmentState:
                description: FulfillmentState indicates the overall intent fulfillment
                  state per 3GPP TS 28.312.
                enum:
                - NOT_FULFILLED
                - PARTIALLY_FULFILLED
                - FULFILLED
                - DEGRADED
                type: string
              intentGroupStatuses:
                description: IntentGroupStatuses contains the status of each intent
                  group.
                items:
                  description: |-
                    IntentGroupStatus represents the status of a single intent group.
                    Aligned with 3GPP TS 28.312 Intent Fulfillment concepts.
                  properties:
                    achievedTargets:
                      description: AchievedTargets reports whether each expected target
                        has been achieved.
                      properties:
                        bandwidth:
                          description: Bandwidth indicates if the bandwidth target
                            was achieved.
                          enum:
                          - achieved
                          - not_achieved
                          - not_applicable
                          type: string
                        latency:
                          description: Latency indicates if the latency target was
                            achieved.
                          enum:
                          - achieved
                          - not_achieved
                          - not_applicable
                          type: string
                        resourceShare:
                          description: ResourceShare indicates if the resource share
                            allocation was applied.
                          enum:
                          - achieved
                          - not_achieved
                          - not_applicable
                          type: string
                      type: object
                    domainStatus:
                      description: DomainStatus contains the fulfillment status of
                        each domain (Core/RAN).
                      properties:
                        coreDomain:
                          description: CoreDomain indicates the fulfillment status
                            of the Core (5GC) domain.
                          properties:
                            lastUpdated:
                              description: LastUpdated indicates when this domain
                                was last updated.
                              format: date-time
                              type: string
                            message:
                              description: Message provides additional information
                                about the domain status.
                              type: string
                            state:
                              description: State indicates the current state of this
                                domain.
                              enum:
                              - CONFIGURED
                              - PENDING
                              - FAILED
                              - SKIPPED
                              type: string
                          required:
                          - state
                          type: object
                        ranDomain:
                          description: RANDomain indicates the fulfillment status
                            of the RAN domain.
                          properties:
                            lastUpdated:
                              description: LastUpdated indicates when this domain
                                was last updated.
                              format: date-time
                              type: string
                            message:
                              description: Message provides additional information
                                about the domain status.
                              type: string
                            state:
                              description: State indicates the current state of this
                                domain.
                              enum:
                              - CONFIGURED
                              - PENDING
                              - FAILED
                              - SKIPPED
                              type: string
                          required:
                          - state
                          type: object
                      type: object
                    fulfillmentState:
                      description: FulfillmentState indicates whether the intent has
                        been fulfilled per 3GPP TS 28.312.
                      enum:
                      - NOT_FULFILLED
                      - PARTIALLY_FULFILLED
                      - FULFILLED
                      - DEGRADED
                      type: string
                    id:
                      description: ID is the intent group identifier.
                      type: string
                    message:
                      description: Message provides additional status information.
                      type: string
                    phase:
                      description: Phase indicates the current phase of processing.
                      enum:
                      - Pending
                      - Processing
                      - Applied
                      - Failed
                      type: string
                    translatedParams:
                      description: TranslatedParams contains the translated domain-specific
                        parameters.
                      properties:
                        coreParams:
                          description: CoreParams contains the translated Core domain
                            parameters.
                          properties:
                            fiveQI:
                              description: FiveQI (5G QoS Identifier) value.
                              type: integer
                            qfi:
                              description: QFI (QoS Flow Identifier) derived from
                                5QI mapping.
                              type: integer
                          required:
                          - fiveQI
                          - qfi
                          type: object
                        ranParams:
                          description: RANParams contains the translated RAN domain
                            parameters.
                          properties:
                            maxPrbPolicyRatio:
                              description: MaxPrbPolicyRatio is the maximum PRB policy
                                ratio (0-100).
                              format: int32
                              type: integer
                            minPrbPolicyRatio:
                              description: MinPrbPolicyRatio is the minimum PRB policy
                                ratio (0-100).
                              format: int32
                              type: integer
                            priority:
                              description: Priority is the scheduler priority (0-255).
                              format: int32
                              type: integer
                            sd:
                              description: SD (Slice Differentiator) in decimal.
                              format: int32
                              type: integer
                            sst:
                              description: SST (Slice/Service Type).
                              format: int32
                              type: integer
                          required:
                          - maxPrbPolicyRatio
                          - minPrbPolicyRatio
                          - priority
                          - sd
                          - sst
                          type: object
                      type: object
                  required:
                  - id
                  - phase
                  type: object
                type: array
              lastReconcileTime:
                description: LastReconcileTime is the timestamp of the last reconciliation.
                format: date-time
                type: string
              observedGeneration:
                description: |-
                  ObservedGeneration is the generation of the spec that was last processed.
                  Used to detect spec changes and trigger re-reconciliation.
                format: int64
                type: integer
              phase:
                description: Phase indicates the overall phase of the E2EQoSIntent.
                enum:
                - Pending
                - Processing
                - Applied
                - Failed
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
